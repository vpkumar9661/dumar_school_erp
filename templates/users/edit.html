{% extends 'base.html' %}
{% block title %}Edit User — VVM ERP{% endblock %}
{% block page_title %}Edit User{% endblock %}
{% block content %}
<div class="page-header">
  <div><h4>Edit User: @{{ user.username }}</h4></div>
  <a href="{{ url_for('users.list') }}" class="btn btn-light"><i class="fas fa-arrow-left me-1"></i> Back</a>
</div>
<div class="card" style="max-width:700px;margin:0 auto;">
  <div class="card-header">
    <div class="card-icon" style="background:var(--violet-dim);color:var(--violet);border:1px solid rgba(124,111,239,.2);"><i class="fas fa-user-edit"></i></div>
    <h5>Edit Account Details</h5>
  </div>
  <div class="card-body">
    <form method="POST" class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" name="full_name" value="{{ user.full_name }}" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Username (read-only)</label>
        <input type="text" class="form-control" value="{{ user.username }}" readonly style="background:var(--bg-input);opacity:.6;">
      </div>
      <div class="col-md-6">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" name="email" value="{{ user.email or '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Role</label>
        <select class="form-select" name="role" id="roleSelect" onchange="showLinks()">
          {% for rk, ri in roles.items() %}
          <option value="{{ rk }}" {{ 'selected' if user.role==rk }}>{{ ri.label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-4" id="studentLink">
        <label class="form-label">Linked Student</label>
        <select class="form-select" name="student_id">
          <option value="">— None —</option>
          {% for s in students %}
          <option value="{{ s.id }}" {{ 'selected' if user.student_id==s.id }}>{{ s.student_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-4" id="teacherLink">
        <label class="form-label">Linked Teacher</label>
        <select class="form-select" name="teacher_id">
          <option value="">— None —</option>
          {% for t in teachers %}
          <option value="{{ t.id }}" {{ 'selected' if user.teacher_id==t.id }}>{{ t.teacher_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label">Status</label>
        <select class="form-select" name="is_active">
          <option value="1" {{ 'selected' if user.is_active }}>Active</option>
          <option value="0" {{ 'selected' if not user.is_active }}>Inactive</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">New Password <span style="font-size:10px;color:var(--text-muted);">(leave blank = no change)</span></label>
        <input type="password" class="form-control" name="new_password" placeholder="Only if changing password">
      </div>
      <div class="col-12 d-flex gap-3">
        <button type="submit" class="btn btn-purple px-5">
          <i class="fas fa-save me-2"></i>Save Changes
        </button>
        <a href="{{ url_for('users.list') }}" class="btn btn-light px-4">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function showLinks() {
  const r = document.getElementById('roleSelect').value;
  document.getElementById('studentLink').style.display = (r==='student'||r==='parent') ? 'block' : 'none';
  document.getElementById('teacherLink').style.display = r==='teacher' ? 'block' : 'none';
}
showLinks();
</script>
{% endblock %}
