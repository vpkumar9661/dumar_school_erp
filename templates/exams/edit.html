{% extends 'base.html' %}
{% block title %}Edit Exam — School ERP{% endblock %}
{% block page_title %}Edit Exam{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h4>Edit Exam</h4>
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="/">Dashboard</a></li>
      <li class="breadcrumb-item"><a href="{{ url_for('exams.schedule') }}">Exams</a></li>
      <li class="breadcrumb-item active">Edit</li>
    </ol>
  </div>
  <a href="{{ url_for('exams.schedule') }}" class="btn btn-light">
    <i class="fas fa-arrow-left me-1"></i> Back
  </a>
</div>

<div class="card" style="max-width:700px;margin:0 auto;">
  <div class="card-header">
    <i class="fas fa-edit" style="color:var(--purple-600);"></i>
    <h5>Edit Exam Details</h5>
  </div>
  <div class="card-body">
    <form method="POST" class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Exam Name *</label>
        <input type="text" class="form-control" name="exam_name"
               value="{{ exam.exam_name }}" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Class *</label>
        <select class="form-select" name="class" required>
          {% for c in classes %}
          <option value="{{ c }}" {{ 'selected' if exam.class == c }}>Class {{ c }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">Subject *</label>
        <input type="text" class="form-control" name="subject"
               value="{{ exam.subject }}" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Exam Date *</label>
        <input type="date" class="form-control" name="exam_date"
               value="{{ exam.exam_date }}" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">Start Time</label>
        <input type="time" class="form-control" name="start_time"
               value="{{ exam.start_time or '' }}">
      </div>
      <div class="col-md-4">
        <label class="form-label">End Time</label>
        <input type="time" class="form-control" name="end_time"
               value="{{ exam.end_time or '' }}">
      </div>
      <div class="col-md-4">
        <label class="form-label">Max Marks</label>
        <input type="number" class="form-control" name="max_marks"
               value="{{ exam.max_marks }}" min="1">
      </div>
      <div class="col-md-4">
        <label class="form-label">Room Number</label>
        <input type="text" class="form-control" name="room_number"
               value="{{ exam.room_number or '' }}">
      </div>
      <div class="col-12 d-flex gap-3">
        <button type="submit" class="btn btn-purple px-5">
          <i class="fas fa-save me-2"></i>Save Changes
        </button>
        <a href="{{ url_for('exams.schedule') }}" class="btn btn-light px-4">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
